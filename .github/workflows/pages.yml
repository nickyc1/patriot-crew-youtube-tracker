name: Deploy tracker to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "tests/**"
      - "scripts/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Validate aggregate data
        run: |
          set -euo pipefail
          python3 -m unittest discover -s tests -v
          python3 -m json.tool docs/data.json >/dev/null
          if grep -RniE '(Email adress|Order number|Order id|@[^ ]+\.[A-Za-z]{2,})' docs; then
            echo "Potential customer-level data found in public files"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: "./docs"

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
